name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy app.py app_state.py run.py config/ core/ db/ bot/ routes/

  test:
    runs-on: ubuntu-latest
    env:
      AUTOAPPLY_DEV: "1"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Test
        run: |
          pytest tests/ -x -q || exit_code=$?
          # gevent triggers SIGTERM on exit (code 143 on Linux, 15 on Windows)
          # This is a known quirk, not a real failure
          if [ "${exit_code:-0}" -eq 143 ] || [ "${exit_code:-0}" -eq 15 ]; then
            echo "Ignoring gevent exit code $exit_code"
            exit 0
          fi
          exit ${exit_code:-0}

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ".[dev]"

      - name: Audit dependencies for known vulnerabilities
        run: pip-audit --strict --desc on --ignore-vuln PYSEC-0
