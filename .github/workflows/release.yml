name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform_flag: '--win'
            artifact_glob: 'electron/build/*.exe'
            artifact_name: installer-windows
          - os: macos-latest
            platform_flag: '--mac'
            artifact_glob: 'electron/build/*.dmg'
            artifact_name: installer-macos
          - os: ubuntu-latest
            platform_flag: '--linux'
            artifact_glob: 'electron/build/*.AppImage'
            artifact_name: installer-linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        working-directory: electron
        run: npm ci

      - name: Sync version
        working-directory: electron
        run: node scripts/sync-version.js

      - name: Bundle Python runtime
        working-directory: electron
        run: node scripts/bundle-python.js
        timeout-minutes: 15

      - name: Build installer
        working-directory: electron
        run: npx electron-builder ${{ matrix.platform_flag }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Windows code signing (optional — skipped if not configured)
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          # macOS code signing (optional — skipped if not configured)
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Disable auto-discovery of local signing identities when no cert is configured
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK != '' }}
          # macOS notarization (optional — skipped if not configured)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    needs: build
    if: always() && contains(needs.build.result, 'success')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/installer-windows/*
            artifacts/installer-macos/*
            artifacts/installer-linux/*
          generate_release_notes: true
          draft: ${{ contains(needs.build.result, 'failure') }}
